name: Deploy to Multidev

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.apple.com'

      - name: Install Multidev CLI
        run: npm install -g @apple/multidev

      - name: Deploy to Multidev
        env:
          MULTIDEV_TOKEN: ${{ secrets.MULTIDEV_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ] && [ "${{ github.event.action }}" != "closed" ]; then
            multidev deploy . --preview
          elif [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            multidev deploy .
          fi
